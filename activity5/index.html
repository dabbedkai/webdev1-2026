<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
   <div class="quote-card">
    <blockquote>
      "The best way to learn CSS is to break things and rebuild them."
    </blockquote>
    <cite>— A Wise Developer</cite>
  </div>

    <div class ="challenge-content2">
    <div class="stats">
    <div class="stat">
      <span class="stat-number">128</span>
      <span class="stat-label">Projects</span>
    </div>
    <div class="stat">
      <span class="stat-number">4.9★</span>
      <span class="stat-label">Rating</span>
    </div>
    <div class="stat">
      <span class="stat-number">99%</span>
      <span class="stat-label">Uptime</span>
    </div>
  </div>
  </div>

  <div class="field">
    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="you@example.com" />
    <span class="helper">We'll never share your email.</span>
  </div>

  <div class="banner">
    <h2>Make it Beautiful</h2>
    <p>CSS gradients can be applied to text, not just backgrounds.</p>
  </div>

  <div class="price-card">
    <p class="label">Premium Plan</p>
    <p class="old-price">₱2,400/yr</p>
    <p class="new-price">₱1,200/yr</p>
    <span class="save-badge">Save 50%</span>
  </div>
