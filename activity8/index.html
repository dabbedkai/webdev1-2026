<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="profile-container">
    <article class="profile-box">
        <p class="profile">JD</p>
        <h2 class="name">Jane Dela Cruz</h2>
        <p class="job">UI/UX Designer</p>
    </article>
    </div>

    <div class="price-container">
        <div class="price-box">
            <span class="basic-price">BASIC</span>
            <div class="price-row">
                <h2 class="price">₱299</h2>
                <span class="period">/mo</span>
            </div>
        </div>

        <div class="price-box">
            <span class="basic-price">PRO</span>
            <div class="price-row">
                <h2 class="price">₱599</h2>
                <span class="period">/mo</span>
            </div>
        </div>

        <div class="price-box">
            <span class="basic-price">PREMIUM</span>
            <div class="price-row">
                <h2 class="price">₱999</h2>
                <span class="period">/mo</span>
            </div>
        </div>
    </div>

    <div class="nav-container">
        <nav class="nav-box">
            <h3 class="brand">Brandly</h3>
            <ul class="sub-nav">
                <a href="#" class="main-nav">Home</a>
                <a href="#" class="main-nav">About</a>
                <a href="#" class="main-nav">Services</a>
            </ul>
            <button class="signup">Sign Up</button>
        </nav>
    </div>

     <div class="comment-container">
        <div class="comment-box">
            <div class="avatar">MR</div>
            <div class="comment-content">
                <span class="comment-name">Mark Reyes</span>
                <p class="comment-text">This tutorial finally made flexbox click for me. The visual examples really helped — thanks!</p>
            </div>
        </div>
    </div>

    <div class="tags-container">
        <div class="tags-box">
            <span class="tag">HTML</span>
            <span class="tag">CSS</span>
            <span class="tag">JavaScript</span>
            <span class="tag">Flexbox</span>
            <span class="tag">Responsive Design</span>
            <span class="tag">Git</span>
        </div>
    </div>

</body>
</html>
